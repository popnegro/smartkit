<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartKit - Media Kit</title>
<style>
:root{--primary:#075985;--success:#166534;--bg:#f6f8fb;--panel:#fff;--text:#0f172a;--muted:#475569;--line:#d9e2ec;--radius:12px;--shadow:0 1px 2px rgba(15,23,42,.08),0 8px 24px rgba(15,23,42,.06)}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;line-height:1.45}
a{color:inherit}
.page{min-height:100vh}
.top{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:18px 24px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.94);position:sticky;top:0;z-index:2}
.brand{display:flex;align-items:center;gap:12px}
.logo{width:40px;height:40px;border-radius:10px;background:var(--primary);color:#fff;display:grid;place-items:center;font-weight:950}
.brand strong{display:block}
.brand span{display:block;color:var(--muted);font-size:12px}
.btn{display:inline-flex;align-items:center;justify-content:center;min-height:40px;border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--text);font-weight:850;text-decoration:none;padding:0 12px}
.btn.primary{background:var(--primary);border-color:var(--primary);color:#fff}
.wrap{max-width:1120px;margin:0 auto;padding:28px 24px}
.hero{display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:18px;align-items:end;border-radius:16px;background:linear-gradient(135deg,#075985,#0f766e);color:#fff;padding:28px;box-shadow:var(--shadow)}
.eyebrow{display:block;font-size:11px;font-weight:950;letter-spacing:.04em;text-transform:uppercase;opacity:.85}
h1,h2,h3,p{margin-top:0}
h1{font-size:clamp(34px,5vw,62px);line-height:1;margin-bottom:10px}
.hero p{max-width:680px;margin-bottom:0;color:#dbeafe;font-size:17px}
.summary{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.kpi{border:1px solid rgba(255,255,255,.24);border-radius:12px;background:rgba(255,255,255,.12);padding:12px}
.kpi b{display:block;font-size:24px;line-height:1.1}
.kpi span{display:block;color:#dbeafe;font-size:12px}
.section{margin-top:18px;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.section-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:16px;border-bottom:1px solid var(--line)}
.section-head h2{font-size:20px;margin-bottom:0}
.screen-list{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;padding:16px}
.screen-card{border:1px solid var(--line);border-radius:12px;background:#fff;overflow:hidden}
.media{height:140px;display:grid;place-items:center;font-size:42px;background:linear-gradient(135deg,#075985,#0f766e);color:#fff;position:relative;overflow:hidden}
.media video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.screen-body{display:grid;gap:8px;padding:14px}
.screen-body h3{margin-bottom:0;font-size:18px}
.muted{color:var(--muted)}
.specs{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
.spec{border:1px solid var(--line);border-radius:10px;background:#f8fafc;padding:9px}
.spec span{display:block;color:var(--muted);font-size:11px;font-weight:850;text-transform:uppercase}
.spec b{display:block;font-size:14px}
.empty{max-width:620px;margin:72px auto;padding:24px;border:1px dashed var(--line);border-radius:14px;background:#fff;text-align:center}
.empty h1{font-size:28px}
@media(max-width:760px){
  .top{position:static;display:grid;padding:14px}
  .hero{grid-template-columns:1fr;padding:22px}
  .summary,.screen-list,.specs{grid-template-columns:1fr}
  .wrap{padding:18px 14px}
}
</style>
</head>
<body>
<div class="page">
  <header class="top">
    <div class="brand">
      <div class="logo" id="brand-logo">SK</div>
      <div>
        <strong id="brand-name">SmartKit</strong>
        <span>Media kit comercial</span>
      </div>
    </div>
    <a class="btn" href="./index.html">Ver brochure</a>
  </header>
  <main class="wrap" id="app" aria-live="polite"></main>
</div>

<script src="./config.js"></script>
<script src="./screens-data.js"></script>
<script>
const config = window.APP_CONFIG || {};
const fmt = value => '$' + Math.round(Number(value) || 0).toLocaleString('es-AR');
const imp = screen => parseInt(String(screen.imp || '0').replace(/\./g,''),10) || 0;
const params = new URLSearchParams(location.search);
const id = params.get('id');

function escapeHtml(value){
  return String(value ?? '').replace(/[&<>"']/g, char => ({
    '&':'&amp;',
    '<':'&lt;',
    '>':'&gt;',
    '"':'&quot;',
    "'":'&#39;'
  }[char]));
}

function storedKits(){
  try{return JSON.parse(localStorage.getItem('smartkit-public-kits') || '[]') || [];}
  catch{return [];}
}

function screenMedia(screen){
  const video = screen.video ? `<video src="${escapeHtml(screen.video)}" autoplay muted loop playsinline></video>` : '';
  return `<div class="media" style="background:${escapeHtml(screen.g || 'linear-gradient(135deg,#075985,#0f766e)')}">${escapeHtml(screen.e)}${video}</div>`;
}

function renderEmpty(){
  document.getElementById('app').innerHTML = `
    <section class="empty">
      <span class="eyebrow">Media Kit</span>
      <h1>No hay un media kit publicado</h1>
      <p class="muted">Genera uno desde el dashboard para abrir esta vista pública con datos de cliente, pantallas, inversión e impactos.</p>
      <a class="btn primary" href="./dashboard.html">Ir al gestor</a>
    </section>`;
}

function renderKit(kit){
  const brand = kit.brand || config.brand || {name:'SmartKit',logo:'SK'};
  const screens = (kit.screenIds || []).map(screenId => SCREENS.find(screen => screen.id === screenId)).filter(Boolean);
  const total = Number(kit.total) || 0;
  const impacts = Number(kit.impacts) || screens.reduce((sum,screen) => sum + imp(screen) * 7, 0);
  document.title = `${brand.name} - Media Kit ${kit.client}`;
  document.getElementById('brand-logo').textContent = brand.logo || 'SK';
  document.getElementById('brand-name').textContent = brand.name || 'SmartKit';
  document.getElementById('app').innerHTML = `
    <section class="hero">
      <div>
        <span class="eyebrow">Propuesta DOOH</span>
        <h1>${escapeHtml(kit.client || 'Cliente')}</h1>
        <p>${escapeHtml(kit.contact || 'Contacto a confirmar')} · ${escapeHtml(kit.duration || 'Duracion a confirmar')}</p>
      </div>
      <div class="summary" aria-label="Resumen de media kit">
        <div class="kpi"><b>${screens.length}</b><span>Pantallas</span></div>
        <div class="kpi"><b>${Math.round(impacts / 1000).toLocaleString('es-AR')}k</b><span>Impactos estimados</span></div>
        <div class="kpi"><b>${fmt(total)}</b><span>Inversion</span></div>
        <div class="kpi"><b>${impacts ? fmt(total / impacts * 1000) : '$0'}</b><span>CPM plan</span></div>
      </div>
    </section>
    <section class="section">
      <div class="section-head">
        <div>
          <span class="eyebrow">Inventario seleccionado</span>
          <h2>Pantallas incluidas</h2>
        </div>
        <a class="btn primary" href="./index.html">Cotizar cambios</a>
      </div>
      <div class="screen-list">
        ${screens.map(screen => `
          <article class="screen-card">
            ${screenMedia(screen)}
            <div class="screen-body">
              <h3>${escapeHtml(screen.n)}</h3>
              <p class="muted">${escapeHtml(screen.dir)} · ${escapeHtml(screen.b)}</p>
              <div class="specs">
                <div class="spec"><span>Formato</span><b>${escapeHtml(screen.dim)}</b></div>
                <div class="spec"><span>Resolucion</span><b>${escapeHtml(screen.res)}</b></div>
                <div class="spec"><span>Impactos/dia</span><b>${escapeHtml(screen.imp)}</b></div>
              </div>
            </div>
          </article>`).join('')}
      </div>
    </section>`;
}

const kits = storedKits();
const kit = kits.find(item => item.id === id) || kits[0];
if(kit)renderKit(kit);
else renderEmpty();
</script>
</body>
</html>
